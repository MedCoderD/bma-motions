<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Sidebar</title>
    <style>
        :root {
            --sidebar-width: 260px;
            --sidebar-bg: #f7f6f3;
            --hover-color: #efefed;
            --text-color: #37352f;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            color: var(--text-color);
        }

        /* Sidebar Styles */
        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background-color: var(--sidebar-bg);
            transition: transform 0.3s ease;
            border-right: 1px solid #e8e8e7;
            position: fixed;
            left: 0;
            top: 0;
            overflow-y: auto;
        }

        #sidebar.collapsed {
            transform: translateX(-100%);
        }

        /* Main Content Styles */
        #main-content {
            margin-left: var(--sidebar-width);
            flex-grow: 1;
            padding: 40px;
            transition: margin-left 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }

        #main-content.expanded {
            margin-left: 0;
        }

        /* Taskbar Items */
        .sidebar-header {
            padding: 20px;
            font-weight: 600;
            font-size: 14px;
            color: #91918e;
            text-transform: uppercase;
        }

        .nav-item {
            padding: 8px 20px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            transition: background 0.2s;
        }

        .nav-item:hover {
            background-color: var(--hover-color);
        }

        /* Toggle Button */
        #toggle-btn {
            position: fixed;
            left: 10px;
            top: 10px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
        }

        #toggle-btn:hover {
            background: var(--hover-color);
        }

        h1 { font-size: 3rem; margin: 0; }
    </style>
</head>
<body>

    <button id="toggle-btn">☰ Menu</button>

    <div id="sidebar">
        <div class="sidebar-header">About BMA Policy</div>
        <div class="nav-item">Annual Representative Meeting</div>
        <div class="nav-item">Special Representative Meeting</div>
        <div class="nav-item">Consultants</div>
        <div class="nav-item">Divisional honorary secretaries</div>
        <div class="nav-item">General practitioners</div>
        <div class="nav-item">Medical students</div>
        <div class="nav-item">Resident doctors</div>
        <div class="nav-item">Retired Members</div>
    </div>

    <div id="main-content">
        <h1>Hello</h1>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const content = document.getElementById('main-content');
        const btn = document.getElementById('toggle-btn');

        btn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            content.classList.toggle('expanded');
        });
    </script>

</body>
</html>
